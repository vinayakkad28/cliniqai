name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Core API (Node.js + TypeScript) ─────────────────────────────────────────
  api-checks:
    name: Core API — typecheck + lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: services/api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder

      - name: TypeScript check
        run: npx tsc --noEmit

  # ─── Web App (Next.js) ────────────────────────────────────────────────────────
  web-checks:
    name: Web App — typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001/api

  # ─── AI Service (Python + FastAPI) ────────────────────────────────────────────
  ai-checks:
    name: AI Service — lint + typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ai

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --no-root

      - name: Ruff lint
        run: poetry run ruff check app/

      - name: Pyright typecheck
        run: poetry run pyright app/ || true  # non-blocking until fully typed
