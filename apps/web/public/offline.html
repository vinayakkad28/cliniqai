<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CliniqAI - Offline</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#2563EB" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background-color: #F8FAFC;
      color: #1E293B;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1.5rem;
    }

    .container {
      text-align: center;
      max-width: 420px;
    }

    .logo {
      font-size: 2rem;
      font-weight: 700;
      color: #2563EB;
      margin-bottom: 2rem;
      letter-spacing: -0.02em;
    }

    .logo span {
      color: #64748B;
      font-weight: 400;
    }

    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 1.5rem;
      background: #EFF6FF;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon svg {
      width: 40px;
      height: 40px;
      color: #2563EB;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
      color: #0F172A;
    }

    p {
      font-size: 1rem;
      color: #64748B;
      line-height: 1.6;
      margin-bottom: 1rem;
    }

    .sync-note {
      background: #EFF6FF;
      border: 1px solid #BFDBFE;
      border-radius: 0.75rem;
      padding: 1rem 1.25rem;
      margin-top: 1.5rem;
      font-size: 0.875rem;
      color: #1D4ED8;
    }

    .retry-btn {
      display: inline-block;
      margin-top: 2rem;
      padding: 0.75rem 2rem;
      background: #2563EB;
      color: #fff;
      border: none;
      border-radius: 0.5rem;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    .retry-btn:hover { background: #1D4ED8; }
    .retry-btn:active { background: #1E40AF; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">Cliniq<span>AI</span></div>

    <div class="icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z" />
      </svg>
    </div>

    <h1>You're offline</h1>
    <p>It looks like you've lost your internet connection. Please check your network settings and try again.</p>

    <div class="sync-note">
      Data will sync automatically when your connection is restored. Any forms you've submitted offline will be sent once you're back online.
    </div>

    <button class="retry-btn" onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
