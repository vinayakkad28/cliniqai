version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: cliniqai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cliniqai
      POSTGRES_USER: cliniqai_user
      POSTGRES_PASSWORD: cliniqai_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cliniqai_user -d cliniqai"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cliniqai-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
